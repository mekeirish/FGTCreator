<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FGT Creator</title>

    <style>
        /* ---------- Reset & Base ---------- */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #30363d;
            padding-bottom: 1.25rem;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #58a6ff, #f0883e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .badge-version {
            font-size: 0.7rem;
            background: #1f2937;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #8b949e;
            border: 1px solid #30363d;
            -webkit-text-fill-color: #8b949e;
        }

        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.5rem 1.75rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: #484f58;
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #8b949e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-title .icon {
            font-size: 1.1rem;
        }

        .token-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .token-row input[type="password"] {
            flex: 1;
            min-width: 220px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 0.7rem 1rem;
            color: #e6edf3;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            font-family: 'Fira Code', monospace;
        }

        .token-row input[type="password"]:focus {
            outline: none;
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
        }

        .token-row input[type="password"]::placeholder {
            color: #484f58;
            font-family: 'Segoe UI', sans-serif;
        }

        .token-row .btn {
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .token-row .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background: #238636;
            color: #fff;
        }
        .btn-primary:hover {
            background: #2ea043;
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
        }
        .btn-secondary:hover {
            background: #30363d;
        }

        .btn-danger {
            background: #da3633;
            color: #fff;
        }
        .btn-danger:hover {
            background: #f85149;
        }

        .btn-outline {
            background: transparent;
            color: #58a6ff;
            border: 1px solid #58a6ff;
        }
        .btn-outline:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .btn-success {
            background: #238636;
            color: #fff;
        }
        .btn-success:hover {
            background: #2ea043;
        }

        .btn-sm {
            padding: 0.35rem 0.9rem;
            font-size: 0.8rem;
        }

        .status-msg {
            margin-top: 0.75rem;
            font-size: 0.9rem;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            display: none;
        }
        .status-msg.show {
            display: block;
        }
        .status-msg.info {
            background: #1f2937;
            color: #8b949e;
            border-left: 3px solid #58a6ff;
        }
        .status-msg.success {
            background: #0d2818;
            color: #7ee787;
            border-left: 3px solid #238636;
        }
        .status-msg.error {
            background: #2d0f0f;
            color: #ff7b72;
            border-left: 3px solid #da3633;
        }
        .status-msg.warning {
            background: #2d1f0a;
            color: #f0883e;
            border-left: 3px solid #d29922;
        }

        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 0.5rem;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .stats .num {
            font-weight: 700;
            color: #e6edf3;
        }

        .repo-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 0.25rem;
        }
        .repo-list::-webkit-scrollbar {
            width: 6px;
        }
        .repo-list::-webkit-scrollbar-track {
            background: #0d1117;
            border-radius: 4px;
        }
        .repo-list::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        .repo-item {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #21262d;
            transition: background 0.15s, border-color 0.15s;
        }
        .repo-item:hover {
            background: #161b22;
            border-color: #30363d;
        }

        .repo-item .repo-name {
            font-weight: 500;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 140px;
        }

        .repo-item .repo-name .owner {
            color: #8b949e;
            font-weight: 400;
            font-size: 0.8rem;
        }

        .repo-item .repo-name .repo-icon {
            color: #58a6ff;
            font-size: 1.1rem;
        }

        .repo-item .badge {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .badge-active {
            background: #0d2818;
            color: #7ee787;
            border-color: #238636;
        }
        .badge-inactive {
            background: #1f2937;
            color: #8b949e;
            border-color: #30363d;
        }

        .repo-item .actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-left: auto;
            align-items: center;
        }

        .repo-item .btn-copy-token {
            background: transparent;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .repo-item .btn-copy-token:hover {
            background: #1f2937;
            border-color: #58a6ff;
        }

        .repo-item .btn-delete-token {
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .repo-item .btn-delete-token:hover {
            background: #2d0f0f;
            color: #ff7b72;
            border-color: #da3633;
        }

        .repo-item .btn-create-manual {
            background: #1f2937;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 0.3rem 0.9rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .repo-item .btn-create-manual:hover {
            background: #30363d;
            border-color: #484f58;
        }

        .manual-token-area {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            align-items: center;
            width: 100%;
            margin-top: 0.4rem;
            padding-top: 0.4rem;
            border-top: 1px dashed #30363d;
        }
        .manual-token-area input {
            flex: 1;
            min-width: 180px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 0.3rem 0.6rem;
            color: #e6edf3;
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
        }
        .manual-token-area input:focus {
            outline: none;
            border-color: #58a6ff;
        }
        .manual-token-area .btn-save-manual {
            background: #238636;
            color: #fff;
            border: none;
            padding: 0.25rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .manual-token-area .btn-save-manual:hover {
            background: #2ea043;
        }
        .manual-token-area .btn-cancel-manual {
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 0.25rem 0.8rem;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
        }
        .manual-token-area .btn-cancel-manual:hover {
            background: #2d0f0f;
            color: #ff7b72;
        }

        .token-display-area {
            margin-top: 0.5rem;
        }

        .token-entry {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.7rem 1rem;
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #21262d;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }

        .token-entry .token-repo {
            font-weight: 500;
            font-size: 0.85rem;
            min-width: 120px;
            color: #58a6ff;
        }

        .token-entry .token-value {
            font-family: 'Fira Code', monospace;
            font-size: 0.75rem;
            background: #161b22;
            padding: 0.3rem 0.7rem;
            border-radius: 4px;
            color: #f0883e;
            word-break: break-all;
            flex: 1;
            min-width: 150px;
            border: 1px solid #21262d;
        }

        .token-entry .token-copy {
            background: transparent;
            border: none;
            color: #58a6ff;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            transition: background 0.15s;
        }
        .token-entry .token-copy:hover {
            background: #1f2937;
        }

        .token-entry .token-delete {
            background: transparent;
            border: none;
            color: #8b949e;
            cursor: pointer;
            font-size: 1rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            transition: background 0.15s, color 0.15s;
        }
        .token-entry .token-delete:hover {
            background: #2d0f0f;
            color: #ff7b72;
        }

        .empty-tokens {
            color: #484f58;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            text-align: center;
            border: 1px dashed #21262d;
            border-radius: 8px;
            padding: 1.5rem;
        }

        .spinner {
            display: inline-block;
            width: 1rem;
            height: 1rem;
            border: 2px solid #30363d;
            border-top: 2px solid #58a6ff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 700px) {
            .container {
                padding: 0 0.25rem;
            }
            .card {
                padding: 1rem 1rem;
            }
            .repo-item {
                flex-direction: column;
                align-items: stretch;
                gap: 0.5rem;
            }
            .repo-item .actions {
                margin-left: 0;
            }
            .token-row {
                flex-direction: column;
                align-items: stretch;
            }
            .token-row input[type="password"] {
                min-width: unset;
            }
            .header h1 {
                font-size: 1.4rem;
            }
            .stats {
                gap: 0.8rem;
                font-size: 0.8rem;
            }
            .token-entry {
                flex-direction: column;
                align-items: stretch;
            }
            .token-entry .token-value {
                min-width: unset;
            }
            .manual-token-area {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .mt-1 {
            margin-top: 0.75rem;
        }
        .mb-0 {
            margin-bottom: 0;
        }
        .flex {
            display: flex;
        }
        .flex-center {
            align-items: center;
        }
        .gap-1 {
            gap: 0.5rem;
        }
        .text-muted {
            color: #8b949e;
            font-size: 0.85rem;
        }
        .text-center {
            text-align: center;
        }
        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 0.8rem 1.5rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
            font-size: 0.9rem;
            transform: translateY(120px);
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
            z-index: 999;
            max-width: 400px;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.success {
            border-left: 4px solid #238636;
        }
        .toast.error {
            border-left: 4px solid #da3633;
        }
        .toast.info {
            border-left: 4px solid #58a6ff;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== HEADER ===== -->
        <div class="header">
            <h1>⚡ FGT Creator</h1>
            <span class="badge-version">v3.0</span>
            <span style="margin-left:auto; font-size:0.8rem; color:#484f58;">Fine‑Grained Token Manager</span>
        </div>

        <!-- ===== TOKEN INPUT CARD ===== -->
        <div class="card" id="tokenCard">
            <div class="card-title">
                <span class="icon">🔑</span> Authentification GitHub
            </div>

            <div class="token-row">
                <input type="password" id="patInput"
                placeholder="Entrez votre Classic Personal Access Token (PAT)"
                autocomplete="off" spellcheck="false" />
                <button class="btn btn-primary" id="loadReposBtn">
                    <span id="loadBtnText">📂 Charger mes repos</span>
                </button>
                <button class="btn btn-secondary" id="clearTokenBtn" title="Effacer le token de la mémoire">
                    🗑️ Effacer
                </button>
            </div>

            <div id="statusMessage" class="status-msg"></div>

            <div class="stats" id="statsBar">
                <span>📦 Repos : <span class="num" id="repoCount">—</span></span>
                <span>✅ Avec FGT : <span class="num" id="fgtCount">—</span></span>
                <span>⬜ Sans FGT : <span class="num" id="noFgtCount">—</span></span>
            </div>
        </div>

        <!-- ===== REPOSITORIES LIST ===== -->
        <div class="card" id="repoCard">
            <div class="card-title">
                <span class="icon">📁</span> Dépôts
                <span style="margin-left:auto; font-size:0.7rem; font-weight:400; color:#484f58;" id="repoListInfo">
                    Aucun chargé
                </span>
            </div>

            <div id="repoListContainer">
                <div class="text-muted text-center" style="padding: 2rem 0;" id="emptyRepoMsg">
                    Entrez un token PAT et cliquez sur « Charger mes repos »
                </div>
                <div class="repo-list" id="repoList"></div>
            </div>
        </div>

        <!-- ===== TOKENS DISPLAY (bottom) ===== -->
        <div class="card" id="tokensCard">
            <div class="card-title">
                <span class="icon">🔐</span> Tokens Fine‑Grained créés
                <span style="margin-left:auto; font-size:0.7rem; font-weight:400; color:#484f58;" id="tokenCountInfo">
                    0 token
                </span>
            </div>

            <div class="token-display-area" id="tokenDisplayArea">
                <div id="emptyTokensMsg" class="empty-tokens">
                    Aucun token fine‑grained enregistré localement.
                </div>
                <div id="tokenEntries"></div>
            </div>

            <div style="margin-top:0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap;">
                <button class="btn btn-danger btn-sm" id="clearAllTokensBtn" title="Supprime tous les tokens stockés">
                    🧹 Supprimer tous les tokens
                </button>
                <button class="btn btn-secondary btn-sm" id="refreshBadgesBtn" title="Re‑vérifie les badges sans recharger les repos">
                    🔄 Rafraîchir les badges
                </button>
            </div>
        </div>

        <!-- ===== TOAST ===== -->
        <div id="toast" class="toast"></div>
    </div>

    <script>
        /* ============================================================
               FGT Creator — v3.0 : uniquement création manuelle via lien
               + bouton copier sur chaque repo
               ============================================================ */

        (function() {
            'use strict';

            // ---- DOM refs ----
            const patInput = document.getElementById('patInput');
            const loadBtn = document.getElementById('loadReposBtn');
            const loadBtnText = document.getElementById('loadBtnText');
            const clearTokenBtn = document.getElementById('clearTokenBtn');
            const statusMsg = document.getElementById('statusMessage');
            const repoList = document.getElementById('repoList');
            const emptyRepoMsg = document.getElementById('emptyRepoMsg');
            const repoCount = document.getElementById('repoCount');
            const fgtCount = document.getElementById('fgtCount');
            const noFgtCount = document.getElementById('noFgtCount');
            const repoListInfo = document.getElementById('repoListInfo');
            const tokenEntries = document.getElementById('tokenEntries');
            const emptyTokensMsg = document.getElementById('emptyTokensMsg');
            const tokenCountInfo = document.getElementById('tokenCountInfo');
            const clearAllTokensBtn = document.getElementById('clearAllTokensBtn');
            const refreshBadgesBtn = document.getElementById('refreshBadgesBtn');
            const toast = document.getElementById('toast');

            // ---- State ----
            let currentPat = '';
            let repos = [];
            let showManualInput = {}; // { repoId: true/false }

            // ---- Stockage localStorage ----
            const STORAGE_KEY = 'fgt_tokens';

            function getStoredTokens() {
                try {
                    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
                } catch { return {}; }
            }

            function saveStoredTokens(tokens) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tokens));
            }

            function getTokenForRepo(repoId) {
                const tokens = getStoredTokens();
                return tokens[repoId] || null;
            }

            function setTokenForRepo(repoId, token) {
                const tokens = getStoredTokens();
                tokens[repoId] = token;
                saveStoredTokens(tokens);
            }

            function deleteTokenForRepo(repoId) {
                const tokens = getStoredTokens();
                delete tokens[repoId];
                saveStoredTokens(tokens);
            }

            function clearAllTokens() {
                localStorage.removeItem(STORAGE_KEY);
            }

            // ---- Toast ----
            let toastTimeout = null;

            function showToast(message, type = 'info', duration = 4000) {
                toast.textContent = message;
                toast.className = 'toast ' + type;
                void toast.offsetWidth;
                toast.classList.add('show');
                clearTimeout(toastTimeout);
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, duration);
            }

            // ---- Status message ----
            function setStatus(msg, type = 'info') {
                statusMsg.textContent = msg;
                statusMsg.className = 'status-msg show ' + type;
            }

            function clearStatus() {
                statusMsg.className = 'status-msg';
                statusMsg.textContent = '';
            }

            // ---- UI Helpers ----
            function setLoading(loading) {
                loadBtn.disabled = loading;
                if (loading) {
                    loadBtnText.innerHTML = '<span class="spinner"></span> Chargement…';
                } else {
                    loadBtnText.textContent = '📂 Charger mes repos';
                }
            }

            function updateStats() {
                const total = repos.length;
                const tokens = getStoredTokens();
                let withFgt = 0;
                repos.forEach(r => {
                    if (tokens[r.id]) withFgt++;
                });
                repoCount.textContent = total;
                fgtCount.textContent = withFgt;
                noFgtCount.textContent = total - withFgt;
                repoListInfo.textContent = total + ' repo' + (total > 1 ? 's' : '');
            }

            // ---- Render repo list ----
            function renderRepos() {
                if (!repos.length) {
                    repoList.innerHTML = '';
                    emptyRepoMsg.style.display = 'block';
                    updateStats();
                    return;
                }
                emptyRepoMsg.style.display = 'none';

                const tokens = getStoredTokens();
                let html = '';
                repos.forEach(repo => {
                    const hasToken = !!tokens[repo.id];
                    const badgeClass = hasToken ? 'badge-active' : 'badge-inactive';
                    const badgeText = hasToken ? '✅ FGT actif' : '⬜ Aucun FGT';
                    const showManual = showManualInput[repo.id] || false;

                    html += `
                            <div class="repo-item" data-repo-id="${repo.id}">
                                <div class="repo-name">
                                    <span class="repo-icon">📄</span>
                                    <span>${repo.name}</span>
                                    <span class="owner">${repo.owner.login}</span>
                                </div>
                                <span class="badge ${badgeClass}">${badgeText}</span>
                                <div class="actions">
                                    ${hasToken ? `
                                        <button class="btn-copy-token" data-repo-id="${repo.id}" title="Copier le token">📋 Copier</button>
                                        <button class="btn-delete-token" data-repo-id="${repo.id}" title="Supprimer le token stocké pour ce repo">🗑️</button>
                                    ` : `
                                        <button class="btn-create-manual" data-repo-id="${repo.id}">🔗 Créer sur GitHub</button>
                                    `}
                                </div>
                                ${showManual ? `
                                    <div class="manual-token-area">
                                        <input type="text" class="manual-token-input" placeholder="Collez votre token fine‑grained ici" />
                                        <button class="btn-save-manual" data-repo-id="${repo.id}">💾 Enregistrer</button>
                                        <button class="btn-cancel-manual" data-repo-id="${repo.id}">Annuler</button>
                                    </div>
                                ` : ''}
                            </div>
                        `;
                });
                repoList.innerHTML = html;
                updateStats();

                // ---- Event listeners ----
                // Copier le token depuis le repo
                repoList.querySelectorAll('.btn-copy-token').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const repoId = parseInt(btn.dataset.repoId);
                        const token = getTokenForRepo(repoId);
                        if (token) {
                            copyToClipboard(token);
                            showToast('✅ Token copié dans le presse‑papier !', 'success');
                        } else {
                            showToast('❌ Aucun token trouvé pour ce repo.', 'warning');
                        }
                    });
                });

                // Supprimer le token
                repoList.querySelectorAll('.btn-delete-token').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const repoId = parseInt(btn.dataset.repoId);
                        handleDeleteToken(repoId);
                    });
                });

                // Créer manuellement : ouvrir GitHub et afficher le champ
                repoList.querySelectorAll('.btn-create-manual').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const repoId = parseInt(btn.dataset.repoId);
                        handleOpenGitHubCreate(repoId);
                    });
                });

                // Enregistrer le token saisi manuellement
                repoList.querySelectorAll('.btn-save-manual').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const repoId = parseInt(btn.dataset.repoId);
                        const area = btn.closest('.manual-token-area');
                        const input = area.querySelector('.manual-token-input');
                        const token = input.value.trim();
                        if (!token) {
                            showToast('Veuillez coller un token valide.', 'warning');
                            return;
                        }
                        setTokenForRepo(repoId, token);
                        showManualInput[repoId] = false;
                        renderRepos();
                        renderTokens();
                        showToast('✅ Token enregistré manuellement !', 'success');
                    });
                });

                repoList.querySelectorAll('.btn-cancel-manual').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const repoId = parseInt(btn.dataset.repoId);
                        showManualInput[repoId] = false;
                        renderRepos();
                    });
                });
            }

            // ---- Copier dans le presse-papiers (fallback inclus) ----
            function copyToClipboard(text) {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
                } else {
                    fallbackCopy(text);
                }
            }

            function fallbackCopy(text) {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            }

            // ---- Ouvrir GitHub pour créer le token et afficher le champ manuel ----
            function handleOpenGitHubCreate(repoId) {
                const repo = repos.find(r => r.id === repoId);
                if (!repo) {
                    showToast('❌ Repo introuvable.', 'error');
                    return;
                }

                // Ouvrir la page de création de token avec le repo pré‑rempli
                const url =
                    `https://github.com/settings/personal-access-tokens/new?repo=${repo.full_name}&name=fgt-${repo.name}`;
                window.open(url, '_blank');

                // Afficher le champ de saisie manuelle
                showManualInput[repoId] = true;
                renderRepos();
                showToast('🔗 Page GitHub ouverte. Collez le token dans le champ apparu.', 'info', 6000);
            }

            // ---- Render stored tokens (bottom) ----
            function renderTokens() {
                const tokens = getStoredTokens();
                const entries = Object.entries(tokens);

                if (!entries.length) {
                    tokenEntries.innerHTML = '';
                    emptyTokensMsg.style.display = 'block';
                    tokenCountInfo.textContent = '0 token';
                    return;
                }
                emptyTokensMsg.style.display = 'none';

                let html = '';
                entries.forEach(([repoIdStr, token]) => {
                    const repoId = parseInt(repoIdStr);
                    const repo = repos.find(r => r.id === repoId);
                    const repoName = repo ? repo.name : 'repo #' + repoId;
                    const owner = repo ? repo.owner.login : '';

                    html += `
                            <div class="token-entry" data-repo-id="${repoId}">
                                <span class="token-repo">📁 ${owner ? owner + '/' : ''}${repoName}</span>
                                <span class="token-value">${token}</span>
                                <button class="token-copy" data-repo-id="${repoId}" title="Copier le token">📋</button>
                                <button class="token-delete" data-repo-id="${repoId}" title="Supprimer ce token">🗑️</button>
                            </div>
                        `;
                });
                tokenEntries.innerHTML = html;
                tokenCountInfo.textContent = entries.length + ' token' + (entries.length > 1 ? 's' : '');

                tokenEntries.querySelectorAll('.token-copy').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const repoId = parseInt(btn.dataset.repoId);
                        const token = getTokenForRepo(repoId);
                        if (token) {
                            copyToClipboard(token);
                            showToast('✅ Token copié !', 'success');
                        }
                    });
                });

                tokenEntries.querySelectorAll('.token-delete').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const repoId = parseInt(btn.dataset.repoId);
                        handleDeleteToken(repoId);
                    });
                });
            }

            // ---- Rafraîchir les badges ----
            function refreshBadges() {
                if (!repos.length) {
                    showToast('Aucun repo chargé. Chargez d\'abord vos dépôts.', 'info');
                    return;
                }
                renderRepos();
                renderTokens();
                showToast('✅ Badges mis à jour', 'success', 1500);
            }

            // ---- DELETE token ----
            function handleDeleteToken(repoId) {
                const token = getTokenForRepo(repoId);
                if (!token) {
                    showToast('Aucun token trouvé pour ce repo.', 'warning');
                    return;
                }
                if (confirm(`Supprimer le token fine‑grained pour le repo #${repoId} ?`)) {
                    deleteTokenForRepo(repoId);
                    showManualInput[repoId] = false;
                    renderRepos();
                    renderTokens();
                    showToast('🗑️ Token supprimé', 'info', 1500);
                }
            }

            // ---- LOAD REPOS ----
            async function loadRepos() {
                const pat = patInput.value.trim();
                if (!pat) {
                    setStatus('❌ Veuillez entrer un Personal Access Token.', 'error');
                    return;
                }

                currentPat = pat.replace(/\s/g, '');
                patInput.value = currentPat;

                setLoading(true);
                clearStatus();
                setStatus('⏳ Récupération des dépôts…', 'info');

                try {
                    const response = await fetch('https://api.github.com/user/repos?per_page=100&sort=updated', {
                        headers: {
                            'Authorization': `Bearer ${currentPat}`,
                            'Accept': 'application/vnd.github+json',
                            'X-GitHub-Api-Version': '2022-11-28',
                        },
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        let msg = data.message || 'Erreur inconnue';
                        if (response.status === 401) {
                            msg = '❌ Token invalide ou expiré. Vérifiez votre PAT.';
                        } else if (response.status === 403) {
                            msg = '❌ Accès refusé. Votre PAT n\'a pas les permissions nécessaires (scope `repo` requis).';
                        } else if (response.status === 404) {
                            msg = '❌ API non trouvée. Vérifiez votre token.';
                        }
                        throw new Error(msg);
                    }

                    if (!Array.isArray(data)) {
                        throw new Error('Réponse inattendue de l\'API.');
                    }

                    repos = data;
                    showManualInput = {};
                    renderRepos();
                    renderTokens();
                    setStatus(`✅ ${repos.length} dépôt${repos.length > 1 ? 's' : ''} chargé${repos.length > 1 ? 's' : ''} avec succès !`,
                        'success');
                    showToast(`📂 ${repos.length} repos chargés`, 'success', 2000);

                } catch (err) {
                    console.error('Erreur chargement repos:', err);
                    setStatus(`❌ ${err.message}`, 'error');
                    showToast(`❌ ${err.message}`, 'error', 5000);
                    repos = [];
                    renderRepos();
                    renderTokens();
                } finally {
                    setLoading(false);
                }
            }

            // ---- CLEAR token (mémoire) ----
            function clearTokenMemory() {
                currentPat = '';
                patInput.value = '';
                clearStatus();
                setStatus('🔑 Token effacé de la mémoire. Les repos restent affichés.', 'info');
                showToast('🧹 Token PAT effacé de la mémoire', 'info', 2000);
            }

            // ---- CLEAR ALL tokens (localStorage) ----
            function handleClearAllTokens() {
                const tokens = getStoredTokens();
                const count = Object.keys(tokens).length;
                if (count === 0) {
                    showToast('Aucun token stocké.', 'info', 1500);
                    return;
                }
                if (confirm(`⚠️ Supprimer définitivement les ${count} token(s) fine‑grained stockés localement ?`)) {
                    clearAllTokens();
                    showManualInput = {};
                    renderRepos();
                    renderTokens();
                    showToast(`🧹 ${count} token(s) supprimés`, 'info', 2000);
                }
            }

            // ---- INIT ----
            function init() {
                renderTokens();
                const tokens = getStoredTokens();
                if (Object.keys(tokens).length > 0) {
                    showToast(`🔐 ${Object.keys(tokens).length} token(s) fine‑grained chargé(s) depuis le stockage local.`, 'info',
                        3000);
                }

                loadBtn.addEventListener('click', loadRepos);
                clearTokenBtn.addEventListener('click', clearTokenMemory);
                clearAllTokensBtn.addEventListener('click', handleClearAllTokens);
                refreshBadgesBtn.addEventListener('click', refreshBadges);

                patInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        loadRepos();
                    }
                });

                patInput.focus();
                patInput.addEventListener('input', () => {
                    if (statusMsg.classList.contains('show')) {
                        clearStatus();
                    }
                });

                console.log('🚀 FGT Creator v3.0 (manuel) initialisé.');
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

        })();
    </script>

</body>
</html>
